<footer class="border-t border-white/10 bg-[#0c0c0c] py-12 px-4">
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
    <!-- Branding -->
    <div class="text-center md:text-left">
      <h3 class="text-xl font-bold tracking-tighter text-white mb-2">
        {{ 'BRANDING.NAME' | translate }}
      </h3>
      <p class="text-gray-500 text-sm italic font-mono">
        {{ 'FOOTER.SUBTITLE' | translate }}
      </p>
    </div>

    <!-- Social Links -->
    <div class="flex gap-6">
      @for (link of socials(); track link.name) {
        <a
          [href]="link.url"
          target="_blank"
          class="text-gray-400 hover:text-[var(--accent-cyan)] transition-colors"
        >
          <span class="sr-only">{{ link.name }}</span>
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path [attr.d]="link.path" />
          </svg>
        </a>
      }
    </div>

    <!-- Copyright -->
    <div class="text-gray-500 text-sm flex flex-col md:items-end gap-1">
      <span
        >&copy; {{ currentYear }} {{ 'FOOTER.COPYRIGHT' | translate }}.
        {{ 'FOOTER.RIGHTS' | translate }}</span
      >
      <span
        class="text-[10px] font-mono opacity-50 uppercase tracking-widest pt-1 border-t border-white/5"
      >
        v{{ version }}
      </span>
    </div>
  </div>
</footer>
