<div
  class="glass group rounded-3xl overflow-hidden hover:border-[var(--accent-cyan)]/50 transition-all duration-500 h-full"
>
  <div class="p-8 flex flex-col h-full">
    <!-- Project Image -->
    <div
      class="relative w-full aspect-video mb-8 overflow-hidden rounded-2xl border border-white/10 group-hover:border-[var(--accent-cyan)]/30 transition-colors duration-500"
    >
      <img
        [src]="project.image"
        [alt]="project.name"
        class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700"
        onerror="this.src = 'https://api.dicebear.com/7.x/shapes/svg?seed=' + project.name"
      />
      <div
        class="absolute inset-0 bg-gradient-to-t from-[#0c0c0c]/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"
      ></div>
    </div>

    <h3
      class="text-2xl font-bold mb-3 text-white group-hover:text-[var(--accent-cyan)] transition-colors"
    >
      {{ project.name }}
    </h3>
    <p class="text-gray-400 mb-8 leading-relaxed line-clamp-3 flex-grow">
      {{ project.description }}
    </p>

    @if (project.link) {
      <a
        [href]="project.link"
        target="_blank"
        class="inline-flex items-center text-sm font-bold text-white hover:text-[var(--accent-cyan)] transition-colors gap-2 group/link mt-auto"
      >
        {{ 'PROJECTS.VIEW_BUTTON' | translate }}
        <svg
          class="w-4 h-4 transform group-hover/link:translate-x-1 transition-transform"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 8l4 4m0 0l-4 4m4-4H3"
          ></path>
        </svg>
      </a>
    }
  </div>
</div>
